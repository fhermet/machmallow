# --- SHOWCASE CASE (hero shot) -----------------------------------------
# A planar Mach 1.5 shock in air sweeps a HEXAGONAL LATTICE of heavy
# bubbles (SF6, rho/rho_air ~ 5). Each bubble is a Richtmyer-Meshkov
# shock/bubble interaction: the impedance deficit focuses the
# shock, the baroclinic deposition of vorticity (grad(rho) x grad(p)) rolls
# each bubble into a counter-rotating vortex pair, and the row of
# wakes destabilizes into a dense vortical cascade.
#
# Physically honest (13 canonical shock/bubble interactions), but
# COMPOSED FOR THE IMAGE: dense lattice, strong density contrast (SF6),
# moderate Mach so the vortices have time to roll up cleanly
# over the duration of a video loop. The AMR (grid = true) re-fires on
# each interface and each shock -> the mesh "breathes" with
# the flow, which is the whole visual point.
#
# Run live:   ./build/run cases/bubblefield.ini
# Final chiseled render: add "scheme = weno5" (much less
# dissipated vortices). levels = 5 (default) gives finest 1/1024 ; for a
# quick preview, drop back to 4. MUSCL stays smoother in live.

backend = hybrid
t_end = 3.0
cfl = 0.4

[domain]
x0 = 0
x1 = 4
y0 = 0
y1 = 2

[grid]
nx = 256              # square cells: nx = (x1-x0)/(y1-y0) * ny
ny = 128

[species]
gamma1 = 1.4          # air
gamma2 = 1.09         # SF6 (sulfur hexafluoride)

[state.air]           # air at rest (c = 1)
rho = 1.4
p = 1.0

[state.sf6]           # SF6, pressure equilibrium: rho_SF6/rho_air ~ 5
rho = 7.056
p = 1.0
gas = 2

[state.shock]
shock = air mach 1.5  # post-shock Rankine-Hugoniot in air, direction +x

[ic]
default = air
# --- hexagonal lattice of 13 SF6 bubbles (r = 0.13) -----------------
# "odd" columns (x = 1.0, 2.2, 3.4): 3 bubbles at y = 0.4/1.0/1.6
region.1  = circle 1.0 0.4 0.13 : sf6
region.2  = circle 1.0 1.0 0.13 : sf6
region.3  = circle 1.0 1.6 0.13 : sf6
region.4  = circle 2.2 0.4 0.13 : sf6
region.5  = circle 2.2 1.0 0.13 : sf6
region.6  = circle 2.2 1.6 0.13 : sf6
region.7  = circle 3.4 0.4 0.13 : sf6
region.8  = circle 3.4 1.0 0.13 : sf6
region.9  = circle 3.4 1.6 0.13 : sf6
# "even" columns (x = 1.6, 2.8): 2 offset bubbles at y = 0.7/1.3
region.10 = circle 1.6 0.7 0.13 : sf6
region.11 = circle 1.6 1.3 0.13 : sf6
region.12 = circle 2.8 0.7 0.13 : sf6
region.13 = circle 2.8 1.3 0.13 : sf6
# the shock front (last in the stack: at t=0 it only covers x<0.4)
region.20 = halfplane 1 0 0.4 speed auto : shock

[bc]
left = analytic       # the moving front provides the exact inflow
right = transmissive
bottom = reflective   # channel: keeps the incident shock nicely planar
top = reflective

[amr]
enabled = true
block = 8
levels = 5            # finest 1/1024. Heavy case (full-height shock +
                      # 13 bubbles): ~18k patches at peak, hence the
                      # max_patches raised below. Render of several
                      # minutes -> for a quick preview, drop back to 4.
tag_threshold = 0.05
tag_velocity = 0.05
regrid_every = 4
max_patches = 60000   # GPU pool ~5.2 GB: covers the level-5 peak with
                      # margin (the auto-cap ~16k saturated along the way).
subcycle = true

[output]
frames = 12
prefix = out/bubblefield

[render]
live = true
scale = 4             # pixels per base cell (1024 x 512)
every = 2             # base steps between two frames
grid = true           # AMR patch outlines: the adaptive mesh
                      # (the live view samples down to level 3 ;
                      # beyond that it's sub-pixel. Full depth in
                      # the VTK frames for ParaView.)
rho_min = 0           # 0/0 = auto from the IC
rho_max = 0
