# Déflagration laminaire — régime réactif SUBSONIQUE (v1.5).
# Une flamme prémélangée se propage par CONDUCTION : la chaleur diffuse
# en avant de la zone de réaction, préchauffe le gaz frais au-dessus de
# Tign, qui réagit. Nécessite le chemin réactif VISQUEUX (mu > 0, flux de
# Fourier). q est petit pour que la compression seule ne puisse pas
# allumer (T_brûlé = 1 + (γ-1)q juste au-dessus de Tign) — c'est la
# conduction qui mène, pas un choc. Validé par le driver `deflagration`
# (subsonique, 3× plus rapide qu'avec la seule diffusion numérique).
#
# backend = cpu : les kernels species GPU n'ont pas encore la branche
# visqueuse (la déflagration reste CPU pour l'instant ; cf. ROADMAP).

backend = cpu
t_end = 2.0
cfl = 0.4
mu = 0.02

[reaction]
gamma = 1.4
A = 15
Ea = 4
q = 0.6
Tign = 1.08

[domain]
x0 = 0
x1 = 2
y0 = 0
y1 = 0.05

[grid]
nx = 512
ny = 8

[state.frais]      # gaz réactif au repos (T = 1)
rho = 1.0
p = 1.0

[state.brule]      # poche allumée : état brûlé (T_brûlé = 1.24 > Tign)
rho = 1.0
p = 1.24
gas = 2

[ic]
default = frais
region.1 = halfplane 1 0 0.15 : brule   # x < 0.15 allumé

[bc]
left = transmissive
right = transmissive

[output]
frames = 8
prefix = out/deflagration
