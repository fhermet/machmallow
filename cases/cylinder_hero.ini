# HERO Short — Mach 2 detached bow shock over an immersed CYLINDER (staircase
# mask), deep AMR. The 9:16 flagship loop: icefire vorticity + white schlieren
# shocks, an upgrade of the first published Short with much deeper refinement
# and a stretched wake.
#
# DEEP AMR (5 levels): a coarse, cheap base (dx = 0.04) refined x2 five times
# reaches a finest dx = 0.0025 (finest 1/400) ONLY where it matters — the body
# edge (auto-tagged), the bow shock, and the wake shear layer. The domain is
# stretched far downstream (x1 = 6.4, ~19 D behind the cylinder) so the
# shear-layer roll-up has room to develop and convect through the frame.
#
# INVISCID (Euler): staircase avoids the tiny cut cells, so there is no
# small-cell timestep penalty and the run stays cheap (~10-15 min). The wake
# instability is numerically seeded by the staircase steps (they trip the
# shear layer near the body -> a busy vortical wake). The DISPLAYED body is
# still drawn smooth at render time via the kappa-aware --solid-case mask.
#
#   ./build/run cases/cylinder_hero.ini
#   python3 tools/schlieren_video.py --prefix out/cyl_hero --style vorticity \
#       --cmap icefire --full --solid-case cases/cylinder_hero.ini \
#       --schlieren-overlay 0.7 --frames-dir /tmp/cyl_hero_fr
#   python3 tools/hero.py --frames-dir /tmp/cyl_hero_fr --out out/cyl_hero.mp4 ...
#
# Mach 2: free-stream rho=1.4, p=1, gamma=1.4 -> c=1, so u = Mach = 2.

backend = hybrid              # AmrGpuML (arbitrary depth) on Metal
solid_method = staircase      # cell mask (no tiny cells -> cheap, no dt wall)
t_end = 5.0                   # let the wake instability develop and convect
cfl = 0.4

[domain]
x0 = 0
x1 = 6.4                      # stretched downstream: room for the roll-up
y0 = 0
y1 = 1.6

[grid]
nx = 160                     # coarse base dx = 0.04; AMR does the resolving
ny = 40

[state.freestream]
rho = 1.4
u = 2.0
v = 0
p = 1.0

[ic]
default = freestream

[solid]
region.1 = circle 0.7 0.8 0.15   # D = 0.30, 120 cells across at the finest level

[bc]
left = inflow freestream         # supersonic inlet
right = transmissive             # supersonic outlet
bottom = transmissive
top = transmissive

[amr]
levels = 5                       # base + 4 refinements x2 -> finest 1/400
block = 8
tag_threshold = 0.1              # refine the shock, the body edge and the wake
regrid_every = 4
subcycle = true

[output]
frames = 200                     # dense for the loop over the long wake
prefix = out/cyl_hero
