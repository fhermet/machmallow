# Instabilité de Rayleigh-Taylor (mode unique) — déclaratif.
# Fluide lourd (rho=2) au-dessus du léger (rho=1) sous gravité, nombre
# d'Atwood 1/3. Pression hydrostatique initiale (perturb hydro), seed en
# vitesse verticale localisé à l'interface (sinus x gaussienne).
# Le champignon RT se développe vers t ~ 8-12.

backend = hybrid
t_end = 12
cfl = 0.4

[physics]
gravity = 0 -0.1

[domain]
x0 = 0
x1 = 0.5
y0 = 0
y1 = 1.5

[grid]
nx = 64               # cellules carrées 1/128
ny = 192

[state.light]
rho = 1.0
p = 2.5

[state.heavy]
rho = 2.0
p = 2.5

[ic]
default = light
region.1 = halfplane 0 -1 -0.75 : heavy        # y > 0.75 : lourd dessus
perturb.1 = p hydro 0.75                       # équilibre hydrostatique
perturb.2 = v sing 1 0.01 0.75 0.05            # seed sinus x gaussienne(y)

[bc]
x = periodic
bottom = reflective
top = reflective

[amr]
enabled = true
block = 8
levels = 3            # interface résolue à 1/512
tag_threshold = 0.04
tag_velocity = 0.02
regrid_every = 4
subcycle = true

[output]
frames = 6
prefix = out/rt

[diagnostics]
every = 50            # le log trace la croissance (énergie cinétique)

[render]
live = true
every = 2
grid = true