# Marche descendante en soufflerie Mach 3 (Woodward & Colella 1984) — démo
# visuelle des corps immergés ALIGNÉS à la grille. Un écoulement uniforme
# Mach 3 entre dans une soufflerie 3×1 ; une marche solide (haute de 0.2,
# débutant en x = 0.6) est posée par une section [solid]. Sa face avant et
# son sommet sont alignés à la grille → murs réfléchissants exacts (pas de
# fuite, contrairement à un corps courbe en escalier).
#
# Structure attendue (cas canonique) : arc de choc détaché devant la
# marche, réflexion sur la paroi haute, réflexion de Mach (point triple +
# pied de Mach), ligne de glissement, éventail de détente au coin.
#
#   ./build/run cases/wc_step.ini
#   python tools/schlieren_video.py out/wc_step --style schlieren
#
# Mach 3 : free-stream rho=1.4, p=1, gamma=1.4 -> c=1, donc u = 3.

backend = cpu
t_end = 4.0
cfl = 0.4

[domain]
x0 = 0
x1 = 3
y0 = 0
y1 = 1

[grid]
nx = 480
ny = 160

[state.air]
rho = 1.4
u = 3.0
v = 0
p = 1.0

[ic]
default = air

# la marche : bloc solide x >= 0.6, y <= 0.2 (face avant + sommet alignés)
[solid]
region.1 = rect 0.6 3.01 -0.01 0.2

[bc]
left = inflow air      # entrée supersonique Mach 3
right = transmissive   # sortie supersonique
bottom = reflective    # plancher de la soufflerie (puis sous la marche)
top = reflective       # plafond de la soufflerie

# AMR : raffine les chocs (gradient de densité) et le bord de la marche
# (escalier tagué automatiquement). 2 niveaux subcyclés -> ~960x320 aux
# structures, pour un coût de grille de base 480x160.
[amr]
levels = 2
tag_threshold = 0.15
regrid_every = 4
subcycle = true

[output]
frames = 80
prefix = out/wc_step
