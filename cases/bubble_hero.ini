# --- HERO SHOT vertical (format short 9:16) ----------------------------
# UN gros sujet, plein cadre : une onde de choc plane forte (Mach 2.5)
# monte et percute une bulle legere (helium) qui remplit la largeur.
# C'est l'interaction choc/bulle canonique, mais poussee pour l'image :
#
#   - le choc se REFRACTE en entrant dans la bulle (gaz lent -> rapide)
#     et s'y FOCALISE -> un jet perce la bulle par l'arriere ;
#   - le depot baroclinique de vorticite (grad(rho) x grad(p)) enroule
#     la bulle en un ANNEAU DE VORTEX contrarotatif ;
#   - l'interface se destabilise en BILLOWS de Kelvin-Helmholtz, puis
#     l'anneau se fragmente en MELANGE TURBULENT ;
#   - les parois laterales (canal) renvoient le choc -> structures
#     secondaires qui retravaillent le sillage.
#
# Toute la complexite de la physique compressible dans un seul plan
# lisible, qui monte et fleurit dans le cadre vertical.
#
# Live :  ./build/run cases/bubble_hero.ini
# Rendu cisele : scheme = weno5 (vortex bien moins dissipes) + scale plus
# grand. levels = 5 possible mais lourd ; 4 suffit a l'ecran.

backend = hybrid
t_end = 0.9
cfl = 0.4

[domain]
x0 = 0
x1 = 1.0
y0 = 0
y1 = 2.0              # format vertical 1:2 (proche 9:16)

[grid]
nx = 160             # cellules carrees : nx/ny = (x1-x0)/(y1-y0)
ny = 320

[species]
gamma1 = 1.4         # air
gamma2 = 1.645       # helium contamine (Haas & Sturtevant)

[state.ambiant]      # air au repos (c = 1)
rho = 1.4
p = 1.0

[state.bulle]        # helium leger, equilibre de pression (rho/rho_air ~ 5.5)
rho = 0.2551
p = 1.0
gas = 2              # vrai bi-gaz : interface suivie par phi/Gamma

[state.choc]
shock = ambiant mach 2.5 +y   # choc fort montant, post-choc Rankine-Hugoniot

[ic]
default = ambiant
region.1 = circle 0.5 0.65 0.28 : bulle          # gros sujet centre
region.2 = halfplane 0 1 0.3 speed auto : choc    # front plan, monte (+y)

[bc]
bottom = analytic    # le front mobile fournit l'inflow exact
top = transmissive
left = reflective     # canal : garde le choc incident bien plan
right = reflective

[amr]
enabled = true
block = 8
levels = 4           # finest 1/1280 ; un seul sujet -> bien sous le cap
tag_threshold = 0.04 # un peu plus sensible -> attrape les fins billows KH
tag_velocity = 0.05
regrid_every = 4
subcycle = true

[output]
frames = 30          # sequence VTK fluide pour le montage
prefix = out/bubble_hero

[render]
live = true
scale = 5            # pixels par cellule de base (800 x 1600, vertical)
every = 1            # rafraichi a chaque pas -> live fluide pour capture
grid = false         # beaute brute (l'overlay maillage = variante "tech")
rho_min = 0          # 0/0 = auto depuis l'IC
rho_max = 0
