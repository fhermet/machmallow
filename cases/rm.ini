# Richtmyer-Meshkov instability — two-gas air / SF6, single mode.
# A Mach 1.21 shock in air crosses an air->SF6 interface perturbed
# in cosine (sinex region); the baroclinic deposition of vorticity makes
# the perturbation grow, then the characteristic mushroom.
# The mushroom is a NON-linear regime (k*a > 1): with a
# measured growth a' ~ 0.034/t.u., it must be let run until
# t ~ 6. The left BC is transmissive to let the reflected shock exit
# (an analytic BC would reinject it).

backend = hybrid
t_end = 8.0
cfl = 0.4

[domain]
x0 = 0
x1 = 4
y0 = 0
y1 = 1

[grid]
nx = 256
ny = 64

[species]
gamma1 = 1.4          # air
gamma2 = 1.09         # SF6

[state.air]
rho = 1.4
p = 1.0

[state.sf6]           # rho_SF6/rho_air = 5.04, pressure equilibrium
rho = 7.056
p = 1.0
gas = 2

[state.shock]
shock = air mach 1.21         # RH post-shock in air, direction +x

[ic]
default = sf6
region.1 = sinex 1.5 0.05 1.0 : air    # air to the left of the interface
region.2 = halfplane 1 0 1.2 speed auto : shock  # close to the interface

[bc]
left = transmissive   # lets the reflected shock exit
right = transmissive
y = periodic          # single mode: periodic domain in y

[amr]
enabled = true
block = 8
levels = 4
tag_threshold = 0.05
tag_velocity = 0.05
regrid_every = 4
subcycle = true

[output]
frames = 10
prefix = out/rm

[render]
live = true
scale = 8
every = 2
grid = true
rho_min = 0
rho_max = 0
