# Forward-facing step in a Mach 3 wind tunnel (Woodward & Colella 1984) —
# visual demo of grid-ALIGNED immersed bodies. A uniform Mach 3 flow enters
# a 3×1 wind tunnel; a solid step (0.2 high, starting at x = 0.6) is placed
# by a [solid] section. Its front face and its top are grid-aligned → exact
# reflective walls (no leakage, unlike a curved body in staircase form).
#
# Expected structure (canonical case): detached bow shock ahead of the
# step, reflection on the top wall, Mach reflection (triple point + Mach
# stem), slip line, expansion fan at the corner.
#
#   ./build/run cases/wc_step.ini
#   python tools/schlieren_video.py out/wc_step --style schlieren
#
# Mach 3: free-stream rho=1.4, p=1, gamma=1.4 -> c=1, so u = 3.

backend = hybrid
t_end = 4.0
cfl = 0.4

[domain]
x0 = 0
x1 = 3
y0 = 0
y1 = 1

[grid]
nx = 480
ny = 160

[state.air]
rho = 1.4
u = 3.0
v = 0
p = 1.0

[ic]
default = air

# the step: solid block x >= 0.6, y <= 0.2 (front face + top aligned)
[solid]
region.1 = rect 0.6 3.01 -0.01 0.2

[bc]
left = inflow air      # supersonic inflow Mach 3
right = transmissive   # supersonic outflow
bottom = reflective    # wind tunnel floor (then under the step)
top = reflective       # wind tunnel ceiling

# AMR: refines the shocks (density gradient) and the edge of the step
# (staircase tagged automatically). 2 subcycled levels -> ~960x320 at the
# structures, for a base grid cost of 480x160.
[amr]
levels = 2
tag_threshold = 0.15
regrid_every = 4
subcycle = true

[output]
frames = 80
prefix = out/wc_step
