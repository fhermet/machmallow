# Convergent-divergent nozzle + jet: TRANSIENT between regimes.
# A high-pressure chamber (reservoir) empties through a C-D nozzle (immersed
# walls, 6 triangles) into an open ambient medium. The outlet pressure
# follows a STAIRCASE SCHEDULE (backpressure) that PAUSES on each
# characteristic regime: normal shock in the divergent -> overexpanded
# (oblique shocks) -> matched -> underexpanded (expansions) -> strongly
# underexpanded (Mach disk / shock barrel).
#
#   ./build/run cases/nozzle.ini
#   python3 tools/schlieren_video.py --prefix out/nozzle --style schlieren --full
#
# Throat at x=1.7, exit/throat area ratio ~2.3 -> design Mach ~2.35,
# design NPR ~13. Chamber p0=13, backpressure ramped 4 -> 0.5.

backend = hybrid
t_end = 21.5
cfl = 0.4

[domain]
x0 = 0
x1 = 4
y0 = 0
y1 = 1.6

[grid]
nx = 320
ny = 128

[state.chamber]
rho = 13
u = 0
v = 0
p = 13

[state.ambient]
rho = 8
u = 0
v = 0
p = 8

[ic]
default = ambient
region.1 = band x -0.1 1.2 : chamber   # HP reservoir upstream

# C-D nozzle: top and bottom walls, each in 3 triangles.
# contour: inlet x=1.2 (|y-0.8|=0.5), throat x=1.7 (0.12), exit x=2.2 (0.28)
[solid]
# constant-section settling duct (|y-0.8|<0.5): no
# step -> no transverse waves; the reservoir inlet feeds cleanly
region.7 = rect -0.2 1.2 1.3 1.7
region.8 = rect -0.2 1.2 -0.2 0.3
# C-D nozzle: top and bottom walls, each in 3 triangles
region.1 = triangle 1.2 1.6 1.2 1.3 1.7 0.92
region.2 = triangle 1.2 1.6 1.7 0.92 2.2 1.08
region.3 = triangle 1.2 1.6 2.2 1.08 2.2 1.6
region.4 = triangle 1.2 0.0 1.2 0.3 1.7 0.68
region.5 = triangle 1.2 0.0 1.7 0.68 2.2 0.52
region.6 = triangle 1.2 0.0 2.2 0.52 2.2 0.0

[bc]
left = reservoir chamber  # reservoir inlet (stagnation conditions, non-reflecting)
# reflective walls on the chamber/nozzle side; open ambient (backpressure)
# staircase schedule: plateaus = PAUSES on each regime (t p pairs).
# NPR=p0/pa: 8.0->normal shock in the divergent (NPR1.6) | 3.7->overexpanded
# oblique (3.5) | 1.0->matched (13) | 0.6->underexpanded/expansions (22) |
# 0.28->strongly underexpanded, Mach disk (46).
bottom = reflective if x < 2.2 else backpressure 0 8.0 5.0 8.0 5.5 3.7 9.0 3.7 9.5 1.0 13.0 1.0 13.5 0.6 17.0 0.6 17.5 0.28 21.5 0.28
top = reflective if x < 2.2 else backpressure 0 8.0 5.0 8.0 5.5 3.7 9.0 3.7 9.5 1.0 13.0 1.0 13.5 0.6 17.0 0.6 17.5 0.28 21.5 0.28
right = backpressure 0 8.0 5.0 8.0 5.5 3.7 9.0 3.7 9.5 1.0 13.0 1.0 13.5 0.6 17.0 0.6 17.5 0.28 21.5 0.28

[amr]
levels = 2
tag_threshold = 0.08
regrid_every = 4
subcycle = true

[output]
frames = 215
prefix = out/nozzle
