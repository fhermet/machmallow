# HERO Short — Mach 2 detached bow shock over an immersed CYLINDER, resolved
# with CUT CELLS (embedded boundary): the surface is geometrically exact, so
# the bow shock, the sonic line and the unsteady vortical wake are clean at a
# modest resolution — no staircase artefacts on the body. This is the 9:16
# flagship loop (icefire vorticity + white schlieren shocks), an upgrade of
# the first published Short which used the staircase mask.
#
#   ./build/run cases/cylinder_hero.ini
#   python3 tools/schlieren_video.py --prefix out/cyl_hero --style vorticity \
#       --cmap icefire --solid-case cases/cylinder_hero.ini \
#       --schlieren-overlay 0.7 --frames-dir /tmp/cyl_hero_fr
#   python3 tools/hero.py --frames-dir /tmp/cyl_hero_fr --out out/cyl_hero.mp4
#
# Mach 2: free-stream rho=1.4, p=1, gamma=1.4 -> c=1, so u = Mach = 2.

backend = hybrid              # AmrGpuCut (2 levels) on Metal — one GPU job
solid_method = cutcell        # exact embedded boundary (smooth surface)
amr.levels = 2                # AMR cut: refine the EB band + the bow shock
t_end = 3.6                   # ~3 flow-throughs: let the near-wake shed
cfl = 0.4

[domain]
x0 = 0
x1 = 3.2                      # extra downstream length for a long wake
y0 = 0
y1 = 1.6

[grid]
nx = 640                     # dx = 0.005 (same resolution as the published Short)
ny = 320

[state.freestream]
rho = 1.4
u = 2.0
v = 0
p = 1.0

[ic]
default = freestream

[solid]
region.1 = circle 0.7 0.8 0.15   # D = 0.30, ~28 cells across

[bc]
left = inflow freestream         # supersonic inlet
right = transmissive             # supersonic outlet
bottom = transmissive
top = transmissive

[output]
frames = 180                     # dense: ~50 frames per flow-through for the loop
prefix = out/cyl_hero
