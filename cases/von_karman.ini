# Von Kármán vortex street — viscous subsonic wake behind an immersed
# CYLINDER. At Re ~ 150 the wake becomes unstable and sheds alternating
# vortices (von Kármán street), periodic: ideal for a hypnotic vorticity
# icefire LOOP.
#
#   ./build/run cases/von_karman.ini
#   python tools/schlieren_video.py --prefix out/von_karman \
#       --style vorticity --cmap icefire --mask-circle 1.2,0,0.1
#   python tools/hero.py --prefix out/von_karman --loop --watermark
#
# Physics: rho=1, p=1, gamma=1.4 -> c=1.183 ; u=0.3 -> M=0.25 (low-Mach,
# nearly incompressible). D=0.2 (radius 0.1). Re = rho*u*D/mu = 0.06/mu.
# mu = 4e-4 -> Re = 150. Strouhal St ~ 0.18 -> period T = D/(St*u) ~ 3.7.
#
# AMR on the VELOCITY GRADIENT (tag_velocity): at low-Mach the density is
# nearly constant, but the vortices have strong velocity gradients.
# HIGH threshold (0.10) -> refinement concentrates on the wake core in large
# clean blocks (the coarse background stays black, no speckling); a threshold
# too low refines into scattered micro-patches and speckles the vorticity at
# the interfaces. 3 levels: base 24 cell/D -> fine 96 cell/D.

backend = hybrid
scheme = muscl
t_end = 60.0
cfl = 0.4
mu = 4e-4

[domain]
x0 = 0
x1 = 5.6
y0 = -1.0
y1 = 1.0

[grid]
nx = 672
ny = 240

[state.air]
rho = 1.0
u = 0.3
v = 0
p = 1.0

[ic]
default = air
# transverse nudge to trigger shedding quickly (otherwise the symmetry
# takes a long time to break): v += 0.05*sin(2pi*2*(x-x0)/lx)*exp(-(y/0.4)^2)
perturb.1 = v sing 2 0.05 0.0 0.4

[solid]
region.1 = circle 1.2 0.0 0.1          # cylinder D=0.2, 6D upstream / 22D downstream

[bc]
left = inflow air
right = transmissive
top = transmissive
bottom = transmissive

[amr]
enabled = true
block = 8
levels = 3
tag_threshold = 1e30        # |grad rho| useless at low-Mach -> disabled
tag_velocity = 0.10         # refines the wake core (velocity gradient)
regrid_every = 4
subcycle = true

[output]
frames = 300
prefix = out/von_karman

[diagnostics]
every = 200
file = out/von_karman_log.csv
