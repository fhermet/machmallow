# --- HERO SHOT: Double Mach Reflection (Woodward & Colella 1984) --------
# Mach 10 shock inclined at 60 degrees on a wall. This is THE showcase of
# complex compressible physics, in a single flow:
#
#   - incident shock + reflected shock + MACH STEM (the triple shock);
#   - the TRIPLE POINT from which a SLIP LINE (contact) originates and
#     rolls up into a KELVIN-HELMHOLTZ CASCADE -> necklace of vortices;
#   - a fast wall JET shooting under the Mach stem;
#   - a second Mach reflection (hence "double") lower down.
#
# WENO5 is essential here: the slip line is a contact discontinuity that
# MUSCL smears; WENO5 keeps the KH billows nice and sharp.
#
# Live:  ./build/run cases/dmr_hero.ini
#
# SHORT 9:16 FRAMING: the DMR is horizontal, but all the richness is
# concentrated around the triple point. For a vertical, recrop (in
# editing or with a zoomed screen-record) the window:
#     x in [2.85, 3.30]   (width 0.45)
#     y in [0.00, 0.80]   (height 0.80)  -> ratio 0.45:0.80 ~= 9:16
# There you see, from bottom to top: wall jet -> KH vortices of the slip
# line -> triple point -> reflected/incident shocks. Full frame.

backend = hybrid
scheme = weno5
t_end = 0.2
cfl = 0.4

[domain]
x0 = 0
x1 = 4
y0 = 0
y1 = 1

[grid]
nx = 512
ny = 128             # base 1/128 ; finest = ny/4 * 2^(levels-1)

[state.pre]          # gas at rest ahead of the shock
rho = 1.4
p = 1.0

[state.post]         # behind the Mach 10 shock at 60 degrees
rho = 8.0
u = 7.144709581221619     # 8.25 * sin(60)
v = -4.125                # -8.25 * cos(60)
p = 116.5

[ic]
default = pre
region.1 = halfplane 1 -0.5773502691896258 0.16666666666666666 speed 10 : post

[bc]
left = analytic
right = transmissive
bottom = analytic if x < 0.16666666666666666 else reflective
top = analytic

[amr]
enabled = true
block = 8
levels = 6           # finest 1/512. levels = 5 = finer (the slip line
                     # gains detail) but live heavier.
tag_threshold = 0.12
regrid_every = 4
subcycle = true
max_patches = 36974

[output]
frames = 150          # N images spaced in time (1 max per step)
# every = 10          # alternative: 1 image every K steps (takes priority
                     # over frames); every = 1 = one frame per iteration
prefix = out/dmr_hero

[render]
live = true
scale = 3            # 1536 x 384 (landscape: screen-record then recrop)
every = 1            # refreshed every step -> smooth live for capture
grid = false         # raw beauty (mesh overlay = "tech" variant)
rho_min = 1.4        # canonical W&C range: saturates the Mach stem, makes
rho_max = 21.0       # the slip line stand out (0/0 = auto otherwise)
