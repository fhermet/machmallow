# Double Mach reflection (Woodward & Colella 1984)
# Mach 10 sur paroi à 60°, domaine [0,4]x[0,1]

case = dmr
backend = hybrid      # cpu | hybrid
cfl = 0.4
# t_end = 0.2         # défaut du cas

[grid]
ny = 128              # coarse ; fin = 1/256 (nx = 4*ny par défaut)

[amr]
enabled = true
block = 8
tag_threshold = 0.12
regrid_every = 4
subcycle = true

[output]
frames = 4
prefix = out/dmr_run
