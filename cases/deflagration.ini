# Laminar deflagration — SUBSONIC reactive regime (v1.5).
# A premixed flame propagates by CONDUCTION: heat diffuses ahead of the
# reaction zone, preheats the fresh gas above Tign, which reacts.
# Requires the VISCOUS reactive path (mu > 0, Fourier flux). q is small so
# that compression alone cannot ignite (T_burnt = 1 + (γ-1)q just above
# Tign) — conduction leads, not a shock. Validated by the `deflagration`
# driver (subsonic, 3× faster than with numerical diffusion alone).
#
# backend = cpu: the GPU species kernels do not yet have the viscous
# branch (deflagration stays CPU for now; cf. ROADMAP).

backend = hybrid
t_end = 2.0
cfl = 0.4
mu = 0.02

[reaction]
gamma = 1.4
A = 15
Ea = 4
q = 0.6
Tign = 1.08

[domain]
x0 = 0
x1 = 2
y0 = 0
y1 = 0.05

[grid]
nx = 512
ny = 8

[state.fresh]      # reactive gas at rest (T = 1)
rho = 1.0
p = 1.0

[state.burnt]      # ignited pocket: burnt state (T_burnt = 1.24 > Tign)
rho = 1.0
p = 1.24
gas = 2

[ic]
default = fresh
region.1 = halfplane 1 0 0.15 : burnt   # x < 0.15 ignited

[bc]
left = transmissive
right = transmissive

[output]
frames = 8
prefix = out/deflagration

[render]
live = true
scale = 3
every = 8

[render]
live = true
scale = 4
every = 4
grid = false
rho_min = 0
rho_max = 0