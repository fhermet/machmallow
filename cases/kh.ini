# Kelvin-Helmholtz doublement périodique — déclaratif.
# Bande dense en contre-courant, perturbation sinusoïdale en v.

backend = cpu
scheme = muscl
t_end = 2.0
cfl = 0.4
mu = 2e-4                # p.ex. 2e-4 pour la version visqueuse

[domain]
x0 = 0
x1 = 1
y0 = 0
y1 = 1

[grid]
nx = 128
ny = 128

[state.outer]
rho = 1.0
u = -0.25
p = 2.5

[state.band]
rho = 2.0
u = 0.25
p = 2.5

[ic]
default = outer
region.1 = band y 0.25 0.75 : band
perturb.1 = v sin 2 0.01      # v += 0.01·sin(2·2π·x/Lx)

[bc]
x = periodic
y = periodic

[amr]
enabled = true
block = 8
levels = 3            # rouleaux résolus à 1/512
tag_threshold = 0.08
regrid_every = 4
subcycle = true

[output]
frames = 8
prefix = out_muscl/kh_run

[render]
live = true
scale = 5             # pixels par cellule de base
every = 2             # pas de base entre deux frames
grid = false           # contours des patchs AMR
rho_min = 0          # 0/0 = auto depuis l'IC
rho_max = 0