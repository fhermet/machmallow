# Arc de choc détaché sur un CYLINDRE IMMERGÉ — démo visuelle des corps
# immergés. Un écoulement uniforme Mach 2 percute un cylindre solide (posé
# par une section [solid], représentation en escalier sur la grille
# cartésienne) : il se forme un arc de choc courbe détaché en amont du nez,
# une ligne sonique, et un sillage. Iconique en schlieren.
#
#   ./build/run cases/cylinder_bowshock.ini
#   python tools/schlieren_video.py out/cylinder --style schlieren
#
# Mach 2 : free-stream rho=1.4, p=1, gamma=1.4 -> c=1, donc u = Mach = 2.

backend = cpu
t_end = 1.2
cfl = 0.4

[domain]
x0 = 0
x1 = 2.4
y0 = 0
y1 = 1.6

[grid]
nx = 480
ny = 320

[state.freestream]
rho = 1.4
u = 2.0
v = 0
p = 1.0

[ic]
default = freestream      # tout le domaine au repos relatif = free-stream

[solid]
region.1 = circle 0.8 0.8 0.18

[bc]
left = inflow freestream  # entrée supersonique (toutes les caractéristiques entrent)
right = transmissive      # sortie supersonique
bottom = transmissive
top = transmissive

# AMR : raffine l'arc de choc (gradient de densité) ET le bord du cylindre
# (l'escalier est tagué automatiquement) — lisse la frontière. 2 niveaux.
[amr]
levels = 2
tag_threshold = 0.1
regrid_every = 4
subcycle = true

[output]
frames = 60
prefix = out/cylinder
