# --- CAS VITRINE (hero shot) -------------------------------------------
# Un choc plan Mach 1.5 dans l'air balaie un RESEAU HEXAGONAL de bulles
# lourdes (SF6, rho/rho_air ~ 5). Chaque bulle est une interaction
# choc/bulle de Richtmyer-Meshkov : le deficit d'impedance focalise le
# choc, le depot baroclinique de vorticite (grad(rho) x grad(p)) enroule
# chaque bulle en paire de vortex contrarotative, et la rangee de
# sillages se destabilise en une cascade tourbillonnaire dense.
#
# Physiquement honnete (13 interactions choc/bulle canoniques), mais
# COMPOSE POUR L'IMAGE : reseau dense, fort contraste de densite (SF6),
# Mach modere pour que les vortex aient le temps de s'enrouler proprement
# sur la duree d'une boucle video. L'AMR (grid = true) se rallume sur
# chaque interface et chaque choc -> le maillage "respire" avec
# l'ecoulement, ce qui est tout l'interet visuel.
#
# Lancer en live :   ./build/run cases/bubblefield.ini
# Rendu final cisele : ajouter "scheme = weno5" (vortex bien moins
# dissipes). levels = 5 (defaut) donne le finest 1/1024 ; pour un
# apercu rapide, repasser a 4. MUSCL reste plus fluide en live.

backend = hybrid
t_end = 3.0
cfl = 0.4

[domain]
x0 = 0
x1 = 4
y0 = 0
y1 = 2

[grid]
nx = 256              # cellules carrees : nx = (x1-x0)/(y1-y0) * ny
ny = 128

[species]
gamma1 = 1.4          # air
gamma2 = 1.09         # SF6 (hexafluorure de soufre)

[state.air]           # air au repos (c = 1)
rho = 1.4
p = 1.0

[state.sf6]           # SF6, equilibre de pression : rho_SF6/rho_air ~ 5
rho = 7.056
p = 1.0
gas = 2

[state.choc]
shock = air mach 1.5  # post-choc Rankine-Hugoniot dans l'air, direction +x

[ic]
default = air
# --- reseau hexagonal de 13 bulles SF6 (r = 0.13) -------------------
# colonnes "impaires" (x = 1.0, 2.2, 3.4) : 3 bulles a y = 0.4/1.0/1.6
region.1  = circle 1.0 0.4 0.13 : sf6
region.2  = circle 1.0 1.0 0.13 : sf6
region.3  = circle 1.0 1.6 0.13 : sf6
region.4  = circle 2.2 0.4 0.13 : sf6
region.5  = circle 2.2 1.0 0.13 : sf6
region.6  = circle 2.2 1.6 0.13 : sf6
region.7  = circle 3.4 0.4 0.13 : sf6
region.8  = circle 3.4 1.0 0.13 : sf6
region.9  = circle 3.4 1.6 0.13 : sf6
# colonnes "paires" (x = 1.6, 2.8) : 2 bulles decalees a y = 0.7/1.3
region.10 = circle 1.6 0.7 0.13 : sf6
region.11 = circle 1.6 1.3 0.13 : sf6
region.12 = circle 2.8 0.7 0.13 : sf6
region.13 = circle 2.8 1.3 0.13 : sf6
# le front de choc (dernier dans la pile : a t=0 il ne couvre que x<0.4)
region.20 = halfplane 1 0 0.4 speed auto : choc

[bc]
left = analytic       # le front mobile fournit l'inflow exact
right = transmissive
bottom = reflective   # canal : garde le choc incident bien plan
top = reflective

[amr]
enabled = true
block = 8
levels = 5            # finest 1/1024. Cas lourd (choc plein-hauteur +
                      # 13 bulles) : ~18k patchs au pic, d'ou le
                      # max_patches releve ci-dessous. Rendu de plusieurs
                      # minutes -> pour un apercu rapide, repasser a 4.
tag_threshold = 0.05
tag_velocity = 0.05
regrid_every = 4
max_patches = 60000   # pool GPU ~5.2 Go : couvre le pic du niveau 5 avec
                      # de la marge (l'auto-cap ~16k saturait en chemin).
subcycle = true

[output]
frames = 12
prefix = out/bubblefield

[render]
live = true
scale = 4             # pixels par cellule de base (1024 x 512)
every = 2             # pas de base entre deux frames
grid = true           # contours des patchs AMR : le maillage adaptatif
                      # (la vue live echantillonne jusqu'au niveau 3 ;
                      # au-dela c'est sous-pixel. Profondeur complete dans
                      # les frames VTK pour ParaView.)
rho_min = 0           # 0/0 = auto depuis l'IC
rho_max = 0
