# Tuyère convergente-divergente + jet : TRANSITOIRE entre régimes.
# Une chambre haute pression (réservoir) se vide par une tuyère C-D (parois
# immergées, 6 triangles) dans un milieu ambiant ouvert. La pression de
# sortie est RAMPÉE dans le temps (backpressure) : le jet passe
# surdétendu -> adapté -> sousdétendu, le choc descend le divergent et sort
# par la lèvre, les diamants de choc apparaissent.
#
#   ./build/run cases/nozzle.ini
#   python3 tools/schlieren_video.py --prefix out/nozzle --style schlieren --full
#
# Col à x=1.7, rapport de section sortie/col ~2.3 -> Mach design ~2.35,
# NPR design ~13. Chambre p0=13, contre-pression rampée 4 -> 0.5.

backend = hybrid
t_end = 4.0
cfl = 0.4

[domain]
x0 = 0
x1 = 4
y0 = 0
y1 = 1.6

[grid]
nx = 320
ny = 128

[state.chamber]
rho = 13
u = 0
v = 0
p = 13

[state.ambient]
rho = 4
u = 0
v = 0
p = 4

[ic]
default = ambient
region.1 = band x -0.1 1.2 : chamber   # réservoir HP en amont

# tuyère C-D : parois haute et basse, chacune en 3 triangles.
# contour : inlet x=1.2 (|y-0.8|=0.5), col x=1.7 (0.12), sortie x=2.2 (0.28)
[solid]
# conduit de tranquillisation à section constante (|y-0.8|<0.5) : pas de
# marche -> pas d'ondes transverses ; l'entrée réservoir alimente proprement
region.7 = rect -0.2 1.2 1.3 1.7
region.8 = rect -0.2 1.2 -0.2 0.3
# tuyère C-D : parois haute et basse, chacune en 3 triangles
region.1 = triangle 1.2 1.6 1.2 1.3 1.7 0.92
region.2 = triangle 1.2 1.6 1.7 0.92 2.2 1.08
region.3 = triangle 1.2 1.6 2.2 1.08 2.2 1.6
region.4 = triangle 1.2 0.0 1.2 0.3 1.7 0.68
region.5 = triangle 1.2 0.0 1.7 0.68 2.2 0.52
region.6 = triangle 1.2 0.0 2.2 0.52 2.2 0.0

[bc]
left = reservoir chamber  # entrée réservoir (conditions d'arrêt, non-réfléchissant)
# parois réfléchissantes côté chambre/tuyère ; ambiant ouvert (contre-pression)
bottom = reflective if x < 2.2 else backpressure 4 0.9 1.0 3.5
top = reflective if x < 2.2 else backpressure 4 0.9 1.0 3.5
right = backpressure 4 0.9 1.0 3.5

[amr]
levels = 2
tag_threshold = 0.08
regrid_every = 4
subcycle = true

[output]
frames = 100
prefix = out/nozzle
