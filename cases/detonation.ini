# Détonation 2D en canal — écoulement réactif (v1.5).
# Une réaction à une étape (Arrhenius) libère une chaleur q derrière le
# choc de tête : une détonation auto-entretenue de Chapman-Jouguet se
# propage vers la droite. Tube fermé à gauche (paroi réfléchissante) →
# détente de Taylor → relaxation vers la vitesse CJ (validée à +0.8 %%
# par le driver `detonation`). Une perturbation transverse sème
# l'instabilité cellulaire ; l'AMR raffine la fine zone de réaction.
#
# La progression lambda est portée par le scalaire d'espèce : un état
# `gas = 2` est la zone brûlée/allumée (lambda = 1).

backend = hybrid
scheme = muscl
t_end = 1.2
cfl = 0.4

[reaction]
gamma = 1.4
A = 3000        # taux pré-exponentiel (zone de réaction ~10 mailles fines)
Ea = 10         # énergie d'activation (un peu raide -> cellules)
q = 10          # chaleur de réaction par unité de masse
Tign = 2.5      # cutoff d'allumage (le gaz frais à T=1 ne réagit pas)

[domain]
x0 = 0
x1 = 6
y0 = 0
y1 = 1

[grid]
nx = 384        # base 1/64 -> 3 niveaux -> finest 1/256
ny = 64

[state.frais]   # gaz réactif au repos (T = 1)
rho = 1.0
p = 1.0

[state.allumage]   # driver chaud brûlé (lambda = 1) qui initie
rho = 1.0
p = 30.0
gas = 2

[ic]
default = frais
region.1 = halfplane 1 0 0.3 : allumage   # x < 0.3 : zone allumée
perturb.1 = v sin 6 0.02                   # sème l'instabilité transverse

[bc]
left = reflective       # tube fermé -> détente de Taylor -> CJ
right = transmissive
bottom = reflective     # parois du canal
top = reflective

[amr]
enabled = true
block = 8
levels = 3
tag_threshold = 0.1     # le saut de densité du choc déclenche le raffinement
regrid_every = 2
subcycle = true

[output]
frames = 12
prefix = out/detonation

[render]
live = true
scale = 4
every = 4
grid = false
rho_min = 0
rho_max = 0
