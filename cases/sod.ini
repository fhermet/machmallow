# Sod shock tube aligned in x — declarative.

backend = hybrid
t_end = 0.2
cfl = 0.4

[domain]
x0 = 0
x1 = 1
y0 = 0
y1 = 0.25

[grid]
nx = 128
ny = 32

[state.left]
rho = 1.0
p = 1.0

[state.right]
rho = 0.125
p = 0.1

[ic]
default = right
region.1 = halfplane 1 0 0.5 : left      # x < 0.5

[bc]
left = transmissive
right = transmissive
bottom = transmissive
top = transmissive

[amr]
enabled = true
block = 8
tag_threshold = 0.03
regrid_every = 4

[output]
frames = 4
prefix = out/sod_run

[diagnostics]
every = 25
