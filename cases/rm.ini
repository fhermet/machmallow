# Instabilité de Richtmyer-Meshkov — bi-gaz air / SF6, mode unique.
# Un choc Mach 1.21 dans l'air traverse une interface air->SF6 perturbée
# en cosinus (region sinex) ; le dépôt baroclinique de vorticité fait
# croître la perturbation puis le champignon caractéristique.
# Le champignon est un régime NON-linéaire (k*a > 1) : avec une
# croissance mesurée a' ~ 0.034/u.t., il faut laisser courir jusqu'à
# t ~ 6. La BC gauche est transmissive pour laisser sortir le choc
# réfléchi (une BC analytic le réinjecterait).

backend = hybrid
t_end = 8.0
cfl = 0.4

[domain]
x0 = 0
x1 = 4
y0 = 0
y1 = 1

[grid]
nx = 256
ny = 64

[species]
gamma1 = 1.4          # air
gamma2 = 1.09         # SF6

[state.air]
rho = 1.4
p = 1.0

[state.sf6]           # rho_SF6/rho_air = 5.04, équilibre de pression
rho = 7.056
p = 1.0
gas = 2

[state.choc]
shock = air mach 1.21         # post-choc RH dans l'air, direction +x

[ic]
default = sf6
region.1 = sinex 1.5 0.05 1.0 : air    # air à gauche de l'interface
region.2 = halfplane 1 0 1.2 speed auto : choc  # proche de l'interface

[bc]
left = transmissive   # laisse sortir le choc reflechi
right = transmissive
y = periodic          # mode unique : domaine periodique en y

[amr]
enabled = true
block = 8
levels = 4
tag_threshold = 0.05
tag_velocity = 0.05
regrid_every = 4
subcycle = true

[output]
frames = 10
prefix = out/rm

[render]
live = true
scale = 8
every = 2
grid = true
rho_min = 0
rho_max = 0
