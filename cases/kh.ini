# Instabilité de Kelvin-Helmholtz, domaine [0,1]² doublement périodique
# Bande dense (rho=2) en contre-courant, perturbation sinusoïdale en v.
# Le raffinement suit les rouleaux via le critère de tagging en vitesse.

case = kh
backend = hybrid
cfl = 0.4
t_end = 2.0
mu = 0                # mettre p.ex. 2e-4 pour la version visqueuse

[case]
u0 = 0.5              # saut de vitesse à travers les couches
perturb = 0.01        # amplitude de la perturbation initiale en v

[grid]
ny = 128              # coarse 128x128 ; fin = 1/256

[amr]
enabled = true
block = 8
levels = 3            # base 1/128 -> rouleaux résolus à 1/512
tag_threshold = 0.08  # gradient de densité (la bande dense)
tag_velocity = 0.05   # gradient de vitesse / c (les rouleaux)
regrid_every = 4
subcycle = true

[output]
frames = 8
prefix = out/kh_run
