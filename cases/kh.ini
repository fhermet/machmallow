# Kelvin-Helmholtz doubly periodic — declarative.
# Dense band in counter-flow, sinusoidal perturbation in v.

backend = cpu
scheme = muscl
t_end = 2.0
cfl = 0.4
mu = 2e-4                # e.g. 2e-4 for the viscous version

[domain]
x0 = 0
x1 = 1
y0 = 0
y1 = 1

[grid]
nx = 128
ny = 128

[state.outer]
rho = 1.0
u = -0.25
p = 2.5

[state.band]
rho = 2.0
u = 0.25
p = 2.5

[ic]
default = outer
region.1 = band y 0.25 0.75 : band
perturb.1 = v sin 2 0.01      # v += 0.01·sin(2·2π·x/Lx)

[bc]
x = periodic
y = periodic

[amr]
enabled = true
block = 8
levels = 3            # rolls resolved at 1/512
tag_threshold = 0.08
regrid_every = 4
subcycle = true

[output]
frames = 8
prefix = out_muscl/kh_run

[render]
live = true
scale = 5             # pixels per base cell
every = 2             # base steps between two frames
grid = false           # AMR patch contours
rho_min = 0          # 0/0 = auto from the IC
rho_max = 0