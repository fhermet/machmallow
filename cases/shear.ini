# Couche de cisaillement visqueuse (Navier-Stokes)
# Profil v(x) en erf qui diffuse ; mu > 0 obligatoire pour voir l'effet

case = shear
backend = hybrid
cfl = 0.4
mu = 5e-3             # viscosité dynamique (rho = 1 -> nu = mu)
t_end = 0.15

[case]
v0 = 0.2              # amplitude du saut de vitesse transverse
width = 0.05          # demi-épaisseur initiale de la couche

[grid]
ny = 32

# Note : le tagging AMR actuel est basé sur le gradient de densité ;
# cette couche est quasi isochore, donc aucun bloc n'est raffiné et la
# résolution effective est celle de la grille coarse. Augmenter grid.ny
# pour plus de précision (tagging en vitesse : voir ROADMAP).
[amr]
enabled = false
block = 8

[output]
frames = 3
prefix = out/shear_run
