# Oblique shock on an immersed WEDGE (Mach 2.5 compression ramp) — visual
# demo AND quantitative validation of immersed bodies. A solid ramp
# (half-angle 15°, placed by [solid]) deflects the flow: an attached oblique
# shock starts from it and reflects on the top wall (air-intake-type pattern).
# The shock angle β obeys the exact θ-β-M relation — verified by the
# `immersed_wedge` gate (β ≈ 38.3° measured vs 36.9° exact, staircase bias).
#
#   ./build/run cases/wedge.ini
#   python tools/schlieren_video.py --prefix out/wedge --style schlieren --full
#
# Mach 2.5: free-stream rho=1.4, p=1, gamma=1.4 -> c=1, so u = 2.5.

backend = hybrid
t_end = 1.6
cfl = 0.4

[domain]
x0 = 0
x1 = 2
y0 = 0
y1 = 1

[grid]
nx = 640
ny = 320

[state.air]
rho = 1.4
u = 2.5
v = 0
p = 1.0

[ic]
default = air

# ramp: solid below y = tan(15°)(x - 0.5), i.e. -tan15 x + y < -tan15*0.5
[solid]
region.1 = halfplane -0.26795 1 -0.13397

[bc]
left = inflow air      # supersonic inflow Mach 2.5
right = transmissive   # supersonic outflow
bottom = reflective    # floor (then under the ramp: covered by the solid)
top = reflective       # top wall: reflects the oblique shock

# AMR: refines the oblique shock, its reflection, and the edge of the ramp
[amr]
levels = 2
tag_threshold = 0.12
regrid_every = 4
subcycle = true

[output]
frames = 60
prefix = out/wedge
