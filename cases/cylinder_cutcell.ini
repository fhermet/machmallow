# Detached bow shock on an immersed CYLINDER, resolved with CUT CELLS
# (embedded boundary) instead of the staircase mask: the cylinder surface is
# geometrically exact, so the bow shock and the surface pressure are clean at
# a modest resolution. The cut-cell path (solid_method = cutcell) is 2nd order
# (LSQ + RK2) and threaded through the AMR at any depth on both backends:
#   backend = cpu     -> Amr2 (2 levels) / AmrML (amr.levels != 2)
#   backend = hybrid  -> AmrGpuCut (2 levels) / AmrGpuMLCut          [Metal]
# and is viscous-capable (set `mu`). The EB band auto-refines around the body.
#
#   ./build/run cases/cylinder_cutcell.ini
#   python3 tools/schlieren_video.py --prefix out/cylinder_cc --style schlieren
#
# Mach 2: free-stream rho=1.4, p=1, gamma=1.4 -> c=1, so u = Mach = 2.

backend = cpu
solid_method = cutcell        # exact embedded boundary (vs staircase)
amr.levels = 2                # AMR cut: refine the EB band around the cylinder
t_end = 1.2
cfl = 0.4

[domain]
x0 = 0
x1 = 2.4
y0 = 0
y1 = 1.6

[grid]
nx = 240
ny = 160

[state.freestream]
rho = 1.4
u = 2.0
v = 0
p = 1.0

[ic]
default = freestream

[solid]
region.1 = circle 0.8 0.8 0.18

[bc]
left = inflow freestream       # supersonic inlet
right = transmissive           # supersonic outlet
bottom = transmissive
top = transmissive

[output]
frames = 40
prefix = out/cylinder_cc
