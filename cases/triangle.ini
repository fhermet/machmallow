# Écoulement supersonique autour d'un TRIANGLE immergé (pointe en amont),
# Mach 2.5. Chocs obliques attachés au nez, détentes aux deux épaules
# arrière, sillage décollé qui s'enroule en couches de cisaillement. Démo
# visuelle des corps immergés (forme `triangle` du masque [solid]).
#
#   ./build/run cases/triangle.ini
#   python3 tools/schlieren_video.py --prefix out/triangle --style vorticity \
#       --schlieren-overlay 0.85 --full
#
# Mach 2.5 : free-stream rho=1.4, p=1, gamma=1.4 -> c=1, donc u = 2.5.

backend = hybrid
t_end = 2.0
cfl = 0.4

[domain]
x0 = 0
x1 = 3
y0 = 0
y1 = 1.6

[grid]
nx = 480
ny = 256

[state.air]
rho = 1.4
u = 2.5
v = 0
p = 1.0

[ic]
default = air

# triangle isocèle, pointe (0.7,0.8) en amont, base à x=1.5 (demi-angle ~17°
# -> chocs obliques ATTACHÉS à Mach 2.5).
[solid]
region.1 = triangle 0.7 0.8 1.5 0.55 1.5 1.05

[bc]
left = inflow air      # entrée supersonique Mach 2.5
right = transmissive   # sortie supersonique
bottom = transmissive  # domaine ouvert (corps en écoulement libre)
top = transmissive

[amr]
levels = 2
tag_threshold = 0.1
regrid_every = 4
subcycle = true

[output]
frames = 80
prefix = out/triangle
