# Double Mach reflection (Woodward & Colella 1984) — 100% declarative.
# Mach 10 shock inclined at 60°: halfplane x - y/tan(60°) < 1/6 advancing
# at normal velocity 10. The `analytic` BCs re-evaluate this moving front
# at time t in the ghosts (= the exact top BC), and the bottom is
# segmented: post-shock inflow before the wall corner, reflective wall
# after.

backend = hybrid      # cpu | hybrid
scheme = weno5
t_end = 0.2
cfl = 0.4

[domain]
x0 = 0
x1 = 4
y0 = 0
y1 = 1

[grid]
nx = 512
ny = 128              # base 1/128 ; finest = ny/4 * 2^(levels-1)

[state.pre]           # gas at rest ahead of the shock
rho = 1.4
p = 1.0

[state.post]          # behind the Mach 10 shock at 60°
rho = 8.0
u = 7.144709581221619     # 8.25 * sin(60°)
v = -4.125                # -8.25 * cos(60°)
p = 116.5

[ic]
default = pre
region.1 = halfplane 1 -0.5773502691896258 0.16666666666666666 speed 10 : post

[bc]
left = analytic
right = transmissive
bottom = analytic if x < 0.16666666666666666 else reflective
top = analytic

[amr]
enabled = true
block = 8
levels = 5
tag_threshold = 0.12
regrid_every = 4
subcycle = true

[output]
frames = 4
prefix = out/dmr_run
