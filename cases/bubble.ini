# Interaction choc / bulle d'hélium (Haas & Sturtevant 1987) — bi-gaz.
# La bulle est de l'hélium (gamma 1.667) dans de l'air (gamma 1.4) :
# le déficit d'impédance acoustique focalise le choc et enroule la
# bulle en paire de vortex. L'état post-choc est dérivé automatiquement
# (Rankine-Hugoniot dans l'air) et le front prend sa vitesse de l'état.

backend = hybrid
t_end = 1.2
cfl = 0.4

[domain]
x0 = 0
x1 = 5
y0 = 0
y1 = 1

[grid]
nx = 640              # cellules carrées : nx = (x1-x0)/(y1-y0) * ny
ny = 128

[species]
gamma1 = 1.4          # air
gamma2 = 1.667        # hélium

[state.ambiant]       # air au repos (c = 1)
rho = 1.4
p = 1.0

[state.bulle]         # hélium, équilibre de pression (rho_He/rho_air = 0.138)
rho = 0.193
p = 1.0
gas = 2

[state.choc]
shock = ambiant mach 1.5      # post-choc Rankine-Hugoniot, direction +x

[ic]
default = ambiant
region.1 = circle 0.6 0.5 0.25 : bulle
region.2 = halfplane 1 0 0.1 speed auto : choc   # front, vitesse RH (1.5)

[bc]
left = analytic       # le front mobile fournit l'inflow exact
right = transmissive
bottom = reflective
top = reflective

[amr]
enabled = true
block = 8
levels = 4            # 5 -> finest 1/2048, comptez quelques minutes
tag_threshold = 0.05
tag_velocity = 0.05
regrid_every = 4
subcycle = true

[output]
frames = 10
prefix = out/bubble

[render]
live = true
scale = 5             # pixels par cellule de base
every = 2             # pas de base entre deux frames
grid = false           # contours des patchs AMR
rho_min = 0          # 0/0 = auto depuis l'IC
rho_max = 0