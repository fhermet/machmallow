# Supersonic flow around an immersed TRIANGLE (apex upstream), Mach 2.5.
# Oblique shocks attached at the nose, expansions at the two rear shoulders,
# separated wake that rolls up into shear layers. Visual demo of immersed
# bodies (`triangle` shape of the [solid] mask).
#
#   ./build/run cases/triangle.ini
#   python3 tools/schlieren_video.py --prefix out/triangle --style vorticity \
#       --schlieren-overlay 0.85 --full
#
# Mach 2.5: free-stream rho=1.4, p=1, gamma=1.4 -> c=1, so u = 2.5.

backend = hybrid
t_end = 2.0
cfl = 0.4

[domain]
x0 = 0
x1 = 3
y0 = 0
y1 = 1.6

[grid]
nx = 480
ny = 256

[state.air]
rho = 1.4
u = 2.5
v = 0
p = 1.0

[ic]
default = air

# isosceles triangle, apex (0.7,0.8) upstream, base at x=1.5 (half-angle ~17°
# -> ATTACHED oblique shocks at Mach 2.5).
[solid]
region.1 = triangle 0.7 0.8 1.5 0.55 1.5 1.05

[bc]
left = inflow air      # supersonic inflow Mach 2.5
right = transmissive   # supersonic outflow
bottom = transmissive  # open domain (body in free flow)
top = transmissive

[amr]
levels = 2
tag_threshold = 0.1
regrid_every = 4
subcycle = true

[output]
frames = 80
prefix = out/triangle
