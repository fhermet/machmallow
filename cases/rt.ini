# Rayleigh-Taylor instability (single mode) — declarative.
# Heavy fluid (rho=2) above the light one (rho=1) under gravity, Atwood
# number 1/3. Initial hydrostatic pressure (perturb hydro), seed in
# vertical velocity localized at the interface (sine x gaussian).
# The RT mushroom develops around t ~ 8-12.

backend = hybrid
t_end = 12
cfl = 0.4

[physics]
gravity = 0 -0.1

[domain]
x0 = 0
x1 = 0.5
y0 = 0
y1 = 1.5

[grid]
nx = 64               # square cells 1/128
ny = 192

[state.light]
rho = 1.0
p = 2.5

[state.heavy]
rho = 2.0
p = 2.5

[ic]
default = light
region.1 = halfplane 0 -1 -0.75 : heavy        # y > 0.75: heavy on top
perturb.1 = p hydro 0.75                       # hydrostatic equilibrium
perturb.2 = v sing 1 0.01 0.75 0.05            # seed sine x gaussian(y)

[bc]
x = periodic
bottom = reflective
top = reflective

[amr]
enabled = true
block = 8
levels = 3            # interface resolved at 1/512
tag_threshold = 0.04
tag_velocity = 0.02
regrid_every = 4
subcycle = true

[output]
frames = 6
prefix = out/rt

[diagnostics]
every = 50            # the log traces the growth (kinetic energy)

[render]
live = true
every = 2
grid = true