# Couche limite de Blasius sur plaque plane — validation des murs no-slip.
# Un flot uniforme bas-Mach (M ~ 0.25) rencontre une plaque dont le bord
# d'attaque est à x = 0.15 : le bas glisse (reflective) en amont, puis
# adhère (noslip) sur la plaque. La couche limite visqueuse croît en aval
# et le profil tend vers la solution de similitude de Blasius.
# Le driver `blasius` valide quantitativement le profil (RMS < 3 %,
# delta99 à -2 %, Cf à +7 % vs théorie à Re_x ~ 2700).
#
# Le haut est un flot libre épinglé (gradient de pression nul) et le
# domaine est haut (~14 delta99) : un haut transmissif laisserait le
# déplacement de la couche accélérer le flot et amincir la BL.

backend = hybrid
scheme = muscl
t_end = 12.0
cfl = 0.4
mu = 8e-5

[domain]
x0 = 0
x1 = 1.25
y0 = 0
y1 = 1.0

[grid]
nx = 320
ny = 256

[state.air]
rho = 1.0
u = 0.3
p = 1.0

[ic]
default = air

[bc]
left = inflow air
right = transmissive
top = inflow air                       # flot libre épinglé (ZPG)
bottom = reflective if x < 0.15 else noslip   # glissement puis no-slip

[amr]
enabled = false
levels = 1

[output]
frames = 5
prefix = out/blasius

[diagnostics]
every = 500
file = out/blasius_log.csv
