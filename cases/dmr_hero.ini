# --- HERO SHOT : Double Mach Reflection (Woodward & Colella 1984) -------
# Choc Mach 10 incline a 60 degres sur une paroi. C'est LA vitrine de la
# physique compressible complexe, en un seul ecoulement :
#
#   - choc incident + choc reflechi + PIED DE MACH (le triple choc) ;
#   - le POINT TRIPLE d'ou part une LIGNE DE GLISSEMENT (contact) qui
#     s'enroule en CASCADE DE KELVIN-HELMHOLTZ -> tourbillons en collier ;
#   - un JET de paroi rapide qui fuse sous le pied de Mach ;
#   - une seconde reflexion de Mach (d'ou "double") plus bas.
#
# WENO5 est essentiel ici : la ligne de glissement est une discontinuite
# de contact que MUSCL etale ; WENO5 garde les billows KH bien nets.
#
# Live :  ./build/run cases/dmr_hero.ini
#
# CADRAGE SHORT 9:16 : le DMR est horizontal, mais toute la richesse est
# concentree autour du point triple. Pour un vertical, recadrer (au
# montage ou en screen-record zoome) la fenetre :
#     x in [2.85, 3.30]   (largeur 0.45)
#     y in [0.00, 0.80]   (hauteur 0.80)  -> ratio 0.45:0.80 ~= 9:16
# On y voit, de bas en haut : jet de paroi -> tourbillons KH de la ligne
# de glissement -> point triple -> chocs reflechi/incident. Plein cadre.

backend = hybrid
scheme = weno5
t_end = 0.2
cfl = 0.4

[domain]
x0 = 0
x1 = 4
y0 = 0
y1 = 1

[grid]
nx = 512
ny = 128             # base 1/128 ; finest = ny/4 * 2^(levels-1)

[state.pre]          # gaz au repos devant le choc
rho = 1.4
p = 1.0

[state.post]         # derriere le choc Mach 10 a 60 degres
rho = 8.0
u = 7.144709581221619     # 8.25 * sin(60)
v = -4.125                # -8.25 * cos(60)
p = 116.5

[ic]
default = pre
region.1 = halfplane 1 -0.5773502691896258 0.16666666666666666 speed 10 : post

[bc]
left = analytic
right = transmissive
bottom = analytic if x < 0.16666666666666666 else reflective
top = analytic

[amr]
enabled = true
block = 8
levels = 6           # finest 1/512. levels = 5 = plus fin (la ligne de
                     # glissement gagne en detail) mais live plus lourd.
tag_threshold = 0.12
regrid_every = 4
subcycle = true
max_patches = 36974

[output]
frames = 150          # N images espacees dans le temps (1 max par pas)
# every = 10          # alternative : 1 image tous les K pas (prioritaire
                     # sur frames) ; every = 1 = une frame par iteration
prefix = out/dmr_hero

[render]
live = true
scale = 3            # 1536 x 384 (paysage : screen-record puis recadrer)
every = 1            # rafraichi a chaque pas -> live fluide pour capture
grid = false         # beaute brute (overlay maillage = variante "tech")
rho_min = 1.4        # plage canonique W&C : sature le pied de Mach, fait
rho_max = 21.0       # ressortir la ligne de glissement (0/0 = auto sinon)
