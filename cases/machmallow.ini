# machmallow — the channel mascot: a MARSHMALLOW immersed in the flow
# that takes a detached bow shock at Mach 2. The channel name is a
# pun on Mach + marshmallow, so the mascot IS the brand.
#
# The marshmallow = a vertical capsule ("stadium" shape) composed by the
# union of solid primitives: a central rectangle + two half-circles at the
# ends. The solver masks these cells and treats the fluid/solid faces as
# reflective walls (slip). The rounded bluff nose -> curved bow shock
# detached upstream, sonic line, wake. Iconic in schlieren.
#
#   ./build/run cases/machmallow.ini
#   python tools/schlieren_video.py out/machmallow --style vorticity --cmap icefire \
#       --schlieren-overlay
#
# Mach 2: free-stream rho=1.4, p=1, gamma=1.4 -> c=1, so u = Mach = 2.

backend = hybrid
t_end = 1.6
cfl = 0.4

[domain]
x0 = 0
x1 = 2.4
y0 = 0
y1 = 1.6

[grid]
nx = 480
ny = 320

[state.freestream]
rho = 1.4
u = 2.0
v = 0
p = 1.0

[ic]
default = freestream      # entire domain at free-stream Mach 2

# The marshmallow: vertical capsule centered at (0.95, 0.8), width 0.36
# (end radius 0.18), straight part of height 0.24 -> total height
# 0.60. The rounded left nose gives a well-detached bow shock.
[solid]
region.1 = rect 0.77 1.13 0.68 0.92      # central body
region.2 = circle 0.95 0.92 0.18         # rounded top end
region.3 = circle 0.95 0.68 0.18         # rounded bottom end

[bc]
left = inflow freestream  # supersonic inlet (all characteristics enter)
right = transmissive      # supersonic outlet
bottom = transmissive
top = transmissive

# AMR: refines the bow shock (density gradient) AND the edge of the
# marshmallow (the staircase is tagged automatically) -> smoothed boundary.
[amr]
levels = 2
tag_threshold = 0.1
regrid_every = 4
subcycle = true

[output]
frames = 80
prefix = out/machmallow
