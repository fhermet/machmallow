# Reflection of a planar shock (Ms = 2) on a declarative IMMERSED WALL.
# A shock propagates in +x through air at rest and reflects on a grid-aligned
# solid block (face at x = 0.7). The wall pressure after reflection has an
# exact value (1D shock reflection): p_r = 15 p0.
# Serves as the reference case for the `immersed_case` gate.

backend = cpu
t_end = 0.32
cfl = 0.4

[domain]
x0 = 0
x1 = 1
y0 = 0
y1 = 0.02

[grid]
nx = 400
ny = 8

[state.pre]
rho = 1
u = 0
v = 0
p = 1

# exact post-shock state (Rankine-Hugoniot) of a Ms = 2 shock in `pre`
[state.post]
shock = pre mach 2 +x

[ic]
default = pre
region.1 = band x -1 0.2 : post   # post-shock gas behind x = 0.2

# immersed wall: solid block covering x >= 0.7 (full height)
[solid]
region.1 = rect 0.7 1.01 -0.01 0.03

[bc]
y = periodic
left = transmissive
right = transmissive

[output]
frames = 0
