# 2D channel detonation — reactive flow (v1.5).
# A one-step reaction (Arrhenius) releases a heat q behind the lead
# shock: a self-sustained Chapman-Jouguet detonation propagates to the
# right. Tube closed on the left (reflective wall) → Taylor expansion →
# relaxation towards the CJ velocity (validated to +0.8 %% by the
# `detonation` driver). A transverse perturbation seeds the cellular
# instability; AMR refines the thin reaction zone.
#
# The lambda progress is carried by the species scalar: a state
# `gas = 2` is the burnt/ignited zone (lambda = 1).

backend = hybrid
scheme = muscl
t_end = 1.2
cfl = 0.4

[reaction]
gamma = 1.4
A = 3000        # pre-exponential rate (reaction zone ~10 fine cells)
Ea = 10         # activation energy (a bit stiff -> cells)
q = 10          # heat of reaction per unit mass
Tign = 2.5      # ignition cutoff (the fresh gas at T=1 does not react)

[domain]
x0 = 0
x1 = 6
y0 = 0
y1 = 1

[grid]
nx = 384        # base 1/64 -> 3 levels -> finest 1/256
ny = 64

[state.fresh]   # reactive gas at rest (T = 1)
rho = 1.0
p = 1.0

[state.ignition]   # hot burnt driver (lambda = 1) that initiates
rho = 1.0
p = 30.0
gas = 2

[ic]
default = fresh
region.1 = halfplane 1 0 0.3 : ignition   # x < 0.3: ignited zone
perturb.1 = v sin 6 0.02                   # seeds the transverse instability

[bc]
left = reflective       # closed tube -> Taylor expansion -> CJ
right = transmissive
bottom = reflective     # channel walls
top = reflective

[amr]
enabled = true
block = 8
levels = 3
tag_threshold = 0.1     # the shock density jump triggers refinement
regrid_every = 2
subcycle = true

[output]
frames = 12
prefix = out/detonation

[render]
live = true
scale = 4
every = 4
grid = false
rho_min = 0
rho_max = 0
