# V&V conservation study — a fully PERIODIC viscous Kelvin-Helmholtz on a
# 3-level AMR hierarchy. With periodic boundaries the total mass (and total
# energy) are exactly conserved in the continuous equations, so any drift is
# pure float32 rounding: the Berger-Colella refluxing must keep the coarse/
# fine flux mismatch at the machine floor. The diagnostics log records mass /
# energy every few steps for the vv figure.
#
#   ./build/run vv/conservation.ini
#   (then vv/generate.py plots out/vv_conservation_log.csv)

backend = hybrid
scheme = muscl
t_end = 2.0
cfl = 0.4
mu = 2e-4

[domain]
x0 = 0
x1 = 1
y0 = 0
y1 = 1

[grid]
nx = 128
ny = 128

[state.outer]
rho = 1.0
u = -0.25
p = 2.5

[state.band]
rho = 2.0
u = 0.25
p = 2.5

[ic]
default = outer
region.1 = band y 0.25 0.75 : band
perturb.1 = v sin 2 0.01

[bc]
x = periodic
y = periodic

[amr]
enabled = true
block = 8
levels = 3
tag_threshold = 0.08
regrid_every = 4
subcycle = true

[output]
frames = 1
prefix = out/vv_conservation

[diagnostics]
every = 10
file = out/vv_conservation_log.csv
