# Choc oblique sur un DIÈDRE immergé (rampe de compression Mach 2.5) — démo
# visuelle ET validation chiffrée des corps immergés. Une rampe solide
# (demi-angle 15°, posée par [solid]) dévie l'écoulement : un choc oblique
# attaché en part, se réfléchit sur la paroi haute (motif type entrée d'air).
# L'angle de choc β obéit à la relation exacte θ-β-M — vérifié par le gate
# `immersed_wedge` (β ≈ 38.3° mesuré vs 36.9° exact, biais d'escalier).
#
#   ./build/run cases/wedge.ini
#   python tools/schlieren_video.py --prefix out/wedge --style schlieren --full
#
# Mach 2.5 : free-stream rho=1.4, p=1, gamma=1.4 -> c=1, donc u = 2.5.

backend = hybrid
t_end = 1.6
cfl = 0.4

[domain]
x0 = 0
x1 = 2
y0 = 0
y1 = 1

[grid]
nx = 640
ny = 320

[state.air]
rho = 1.4
u = 2.5
v = 0
p = 1.0

[ic]
default = air

# rampe : solide sous y = tan(15°)(x - 0.5), soit -tan15 x + y < -tan15*0.5
[solid]
region.1 = halfplane -0.26795 1 -0.13397

[bc]
left = inflow air      # entrée supersonique Mach 2.5
right = transmissive   # sortie supersonique
bottom = reflective    # plancher (puis sous la rampe : couvert par le solide)
top = reflective       # paroi haute : réfléchit le choc oblique

# AMR : raffine le choc oblique, sa réflexion, et le bord de la rampe
[amr]
levels = 2
tag_threshold = 0.12
regrid_every = 4
subcycle = true

[output]
frames = 60
prefix = out/wedge
