# Shock / helium bubble interaction (Haas & Sturtevant 1987) — two-gas.
# Experiment configuration: Mach 1.22 shock in air, helium cylinder
# contaminated with 28 %% air by mass (rho/rho_air = 0.182,
# gamma = 1.645 — the values compared by Quirk & Karni 1996).
# The acoustic impedance deficit focuses the shock and rolls the
# bubble into a vortex pair ; the interface velocities are validated
# quantitatively against the experiment by the hs_suite driver.

backend = hybrid
t_end = 2.2
cfl = 0.4

[domain]
x0 = 0
x1 = 5
y0 = 0
y1 = 1

[grid]
nx = 640              # square cells: nx = (x1-x0)/(y1-y0) * ny
ny = 128

[species]
gamma1 = 1.4          # air
gamma2 = 1.645        # helium + 28 % air by mass (H&S)

[state.ambient]       # air at rest (c = 1)
rho = 1.4
p = 1.0

[state.bubble]        # contaminated helium, pressure equilibrium
rho = 0.2551          # 1.4 * 0.18224 (M_mix = 5.28 g/mol vs air 28.96)
p = 1.0

[state.shock]
shock = ambient mach 1.22     # the Mach of the H&S experiment

[ic]
default = ambient
region.1 = circle 0.6 0.5 0.25 : bubble
region.2 = halfplane 1 0 0.1 speed auto : shock   # front, RH velocity (1.5)

[bc]
left = analytic       # the moving front provides the exact inflow
right = transmissive
bottom = reflective
top = reflective

[amr]
enabled = true
block = 8
levels = 4            # 5 -> finest 1/2048, expect a few minutes
tag_threshold = 0.05
tag_velocity = 0.05
regrid_every = 4
subcycle = true

[output]
frames = 10
prefix = out/bubble

[render]
live = true
scale = 5             # pixels per base cell
every = 2             # base steps between two frames
grid = false           # AMR patch outlines
rho_min = 0          # 0/0 = auto from the IC
rho_max = 0