# Allée tourbillonnaire de von Kármán — sillage subsonique visqueux derrière
# un CYLINDRE immergé. À Re ~ 150 le sillage devient instable et lâche des
# tourbillons alternés (allée de von Kármán), périodiques : idéal pour une
# BOUCLE hypnotique en vorticité icefire.
#
#   ./build/run cases/von_karman.ini
#   python tools/schlieren_video.py --prefix out/von_karman \
#       --style vorticity --cmap icefire --mask-circle 1.2,0,0.1
#   python tools/hero.py --prefix out/von_karman --loop --watermark
#
# Physique : rho=1, p=1, gamma=1.4 -> c=1.183 ; u=0.3 -> M=0.25 (bas-Mach,
# quasi incompressible). D=0.2 (rayon 0.1). Re = rho*u*D/mu = 0.06/mu.
# mu = 4e-4 -> Re = 150. Strouhal St ~ 0.18 -> periode T = D/(St*u) ~ 3.7.
#
# AMR sur le GRADIENT DE VITESSE (tag_velocity) : a bas-Mach la densite est
# quasi constante, mais les tourbillons ont de forts gradients de vitesse.
# Seuil ELEVE (0.10) -> le raffinement se concentre sur le coeur du sillage
# en gros blocs propres (le fond grossier reste noir, pas de moucheture) ;
# un seuil trop bas raffine en micro-patchs disperses et mouchete la
# vorticite aux interfaces. 3 niveaux : base 24 cell/D -> fin 96 cell/D.

backend = hybrid
scheme = muscl
t_end = 60.0
cfl = 0.4
mu = 4e-4

[domain]
x0 = 0
x1 = 5.6
y0 = -1.0
y1 = 1.0

[grid]
nx = 672
ny = 240

[state.air]
rho = 1.0
u = 0.3
v = 0
p = 1.0

[ic]
default = air
# coup de pouce transverse pour amorcer vite le lacher (sinon la symetrie
# met longtemps a se rompre) : v += 0.05*sin(2pi*2*(x-x0)/lx)*exp(-(y/0.4)^2)
perturb.1 = v sing 2 0.05 0.0 0.4

[solid]
region.1 = circle 1.2 0.0 0.1          # cylindre D=0.2, 6D amont / 22D aval

[bc]
left = inflow air
right = transmissive
top = transmissive
bottom = transmissive

[amr]
enabled = true
block = 8
levels = 3
tag_threshold = 1e30        # |grad rho| inutile a bas-Mach -> desactive
tag_velocity = 0.10         # raffine le coeur du sillage (gradient de vitesse)
regrid_every = 4
subcycle = true

[output]
frames = 300
prefix = out/von_karman

[diagnostics]
every = 200
file = out/von_karman_log.csv
