# ============================================================
# machmallow — case file template (copy then adapt)
# The whole solver is driven from here: NO C++ code to write.
#   ./build/run --check cases/mycase.ini   check the config
#   ./build/run cases/mycase.ini           run
#   ./build/run --list                     grammar reminder
# Warning: '#' AND ';' start a comment -> one key per line.
# ============================================================

backend = hybrid
# scheme = muscl (default) | weno5 (high-order WENO5 + RK3 ; mono-gas,
#                                  inviscid for now)      # cpu (reference) | hybrid (GPU Metal)
t_end = 0.2
cfl = 0.4
mu = 0                # dynamic viscosity > 0 -> Navier-Stokes

#[physics]
#gravity = 0 -0.1     # split source ; reflective walls become
#                     # hydrostatic automatically

[domain]              # physical rectangle
x0 = 0
x1 = 1
y0 = 0
y1 = 1

[grid]                # base resolution (multiples of amr.block)
nx = 128
ny = 128

# --- Two-gas (optional): two gammas, then `gas = 2` on the states
#     of the second gas. The solver transports the mass fraction
#     (cf. bubble.ini, rm.ini). Incompatible with mu > 0 for now.
#[species]
#gamma1 = 1.4          # gas 1 (default of the states)
#gamma2 = 1.667        # gas 2

# --- Named primitive states (rho, u, v, p ; defaults 1,0,0,1 ;
#     `gas = 2` attaches the state to the second gas of a [species] case) ---
[state.background]
rho = 1.0
p = 1.0

[state.bubble]
rho = 0.1
p = 1.0

# Derived state: post-shock Rankine-Hugoniot computed by the solver
# (references a NON-derived state ; direction +x|-x|+y|-y, default +x)
#[state.shock]
#shock = background mach 1.5

# --- Initial condition: one default + regions that override it
#     (applied in order), + additive perturbations ---
[ic]
default = background
# region.N = halfplane a b c [speed s] : state   -> a*x+b*y < c
#            (speed s: the front advances at normal velocity s — moving
#             shock ; `speed auto` = RH velocity of the derived state)
#          | band x|y lo hi : state
#          | rect x0 x1 y0 y1 : state
#          | circle cx cy r : state
#          | sinex x0 amp lambda : state  -> x < x0+amp*cos(2*pi*y/lambda)
region.1 = circle 0.5 0.5 0.15 : bubble
# perturb.N = u|v|rho|p sin <periods> <amplitude>     (along x)
#           | u|v|rho|p erf <x0> <width> <amplitude>
#           | u|v|rho|p sing <per.> <amp> <yc> <sigma>  (sin x gauss(y))
#           | p hydro <yref>     (hydrostatic pressure, uses gravity)
#perturb.1 = v sin 2 0.01

# --- Boundary conditions per side ---
# transmissive | reflective | analytic | inflow <state>
#   analytic: re-evaluates the regions (including moving fronts) at time t
#             in the ghosts -> exact incident-shock BC
# segmentation: <spec> if x < val else <spec>   (x for bottom/top,
#                y for left/right)
# periodicity per pair: x = periodic and/or y = periodic
[bc]
left = transmissive
right = transmissive
bottom = reflective
top = transmissive

[amr]
enabled = true
levels = 2            # finest = ny * 2^(levels-1) / Ly
block = 8
tag_threshold = 0.05  # relative density gradient
tag_velocity = 0      # velocity jump / local c (shear layers)
regrid_every = 4
subcycle = true

[output]
frames = 4
prefix = out/mycase
# checkpoint = out/mycase.ck    # restart = out/mycase.ck to resume
# max_steps = 100               # hard bound (smoke tests)

# --- Real-time view (hybrid backend): the simulation in a window,
#     sampled zero-copy from the compute buffers.
#     space = pause, q or close = cleanly stop the computation ---
#[render]
#live = true
#scale = 5             # pixels per base cell
#every = 2             # base steps between two frames
#grid = true           # AMR patch outlines
#rho_min = 0           # 0/0 = auto from the IC
#rho_max = 0

# --- Computation log: integral time series in CSV ---
# step, t, dt, per-equation residuals (RMS of dU/dt on the base: mass,
# momentum x/y, energy — convergence tracking), cells, patches, rho/p
# extrema, mass, kinetic/total energies, enstrophy, wall time, throughput
[diagnostics]
every = 10            # base steps between two lines (0 = disabled)
# file = out/mycase_log.csv    # default: <output.prefix>_log.csv
