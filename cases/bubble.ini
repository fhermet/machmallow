# Interaction choc / bulle légère (type Haas & Sturtevant) — déclaratif.
# L'état post-choc est dérivé automatiquement (Rankine-Hugoniot) et le
# front mobile prend sa vitesse de l'état (`speed auto`).

backend = hybrid
t_end = 1.2
cfl = 0.4

[domain]
x0 = 0
x1 = 5
y0 = 0
y1 = 1

[grid]
nx = 640              # cellules carrées : nx = (x1-x0)/(y1-y0) * ny
ny = 128

[state.ambiant]       # gaz au repos (c = 1)
rho = 1.4
p = 1.0

[state.bulle]         # gaz léger, équilibre de pression
rho = 0.1
p = 1.0

[state.choc]
shock = ambiant mach 1.5      # post-choc Rankine-Hugoniot, direction +x

[ic]
default = ambiant
region.1 = circle 0.6 0.5 0.25 : bulle
region.2 = halfplane 1 0 0.1 speed auto : choc   # front, vitesse RH (1.5)

[bc]
left = analytic       # le front mobile fournit l'inflow exact
right = transmissive
bottom = reflective
top = reflective

[amr]
enabled = true
block = 8
levels = 3            # 5 -> finest 1/2048, comptez quelques minutes
tag_threshold = 0.05
tag_velocity = 0.05
regrid_every = 4
subcycle = true

[output]
frames = 10
prefix = out/bubble
