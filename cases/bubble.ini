# Interaction choc / bulle légère (type Haas & Sturtevant) — déclaratif.
# Un choc Mach 1.5 (états de Rankine-Hugoniot, gamma = 1.4) traverse une
# bulle de gaz léger en équilibre de pression : compression de la bulle,
# jet rentrant, puis paire de tourbillons. Parois haut/bas réfléchissantes
# (tube à choc). Le tagging vitesse suit les tourbillons.

backend = hybrid
t_end = 0.7
cfl = 0.4

[domain]
x0 = 0
x1 = 2
y0 = 0
y1 = 1

[grid]
nx = 256
ny = 128              # base 1/128 ; finest 1/512 avec levels = 3

[state.ambiant]       # gaz au repos (c = 1)
rho = 1.4
p = 1.0

[state.bulle]         # gaz léger, équilibre de pression
rho = 0.1
p = 1.0

[state.choc]          # post-choc Mach 1.5 (Rankine-Hugoniot)
rho = 2.606897
u = 0.694444
p = 2.458333

[ic]
default = ambiant
region.1 = circle 0.6 0.5 0.25 : bulle
region.2 = halfplane 1 0 0.2 speed 1.5 : choc   # front partant de x=0.2

[bc]
left = analytic       # le front mobile fournit l'inflow exact
right = transmissive
bottom = reflective
top = reflective

[amr]
enabled = true
block = 8
levels = 3
tag_threshold = 0.05
tag_velocity = 0.05
regrid_every = 4
subcycle = true

[output]
frames = 7
prefix = out/bubble
