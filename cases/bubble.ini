# Interaction choc / bulle d'hélium (Haas & Sturtevant 1987) — bi-gaz.
# Configuration de l'expérience : choc Mach 1.22 dans l'air, cylindre
# d'hélium contaminé à 28 %% d'air en masse (rho/rho_air = 0.182,
# gamma = 1.645 — les valeurs que comparent Quirk & Karni 1996).
# Le déficit d'impédance acoustique focalise le choc et enroule la
# bulle en paire de vortex ; les vitesses d'interface sont validées
# quantitativement contre l'expérience par le driver hs_suite.

backend = hybrid
t_end = 2.2
cfl = 0.4

[domain]
x0 = 0
x1 = 5
y0 = 0
y1 = 1

[grid]
nx = 640              # cellules carrées : nx = (x1-x0)/(y1-y0) * ny
ny = 128

[species]
gamma1 = 1.4          # air
gamma2 = 1.645        # hélium + 28 % d'air en masse (H&S)

[state.ambiant]       # air au repos (c = 1)
rho = 1.4
p = 1.0

[state.bulle]         # hélium contaminé, équilibre de pression
rho = 0.2551          # 1.4 * 0.18224 (M_mel = 5.28 g/mol vs air 28.96)
p = 1.0

[state.choc]
shock = ambiant mach 1.22     # le Mach de l'expérience H&S

[ic]
default = ambiant
region.1 = circle 0.6 0.5 0.25 : bulle
region.2 = halfplane 1 0 0.1 speed auto : choc   # front, vitesse RH (1.5)

[bc]
left = analytic       # le front mobile fournit l'inflow exact
right = transmissive
bottom = reflective
top = reflective

[amr]
enabled = true
block = 8
levels = 4            # 5 -> finest 1/2048, comptez quelques minutes
tag_threshold = 0.05
tag_velocity = 0.05
regrid_every = 4
subcycle = true

[output]
frames = 10
prefix = out/bubble

[render]
live = true
scale = 5             # pixels par cellule de base
every = 2             # pas de base entre deux frames
grid = false           # contours des patchs AMR
rho_min = 0          # 0/0 = auto depuis l'IC
rho_max = 0