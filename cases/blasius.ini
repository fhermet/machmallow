# Blasius boundary layer on a flat plate — validation of no-slip walls.
# A uniform low-Mach flow (M ~ 0.25) meets a plate whose leading
# edge is at x = 0.15: the bottom slips (reflective) upstream, then
# adheres (noslip) on the plate. The viscous boundary layer grows downstream
# and the profile tends toward the Blasius similarity solution.
# The `blasius` driver quantitatively validates the profile (RMS < 3 %,
# delta99 at -2 %, Cf at +7 % vs theory at Re_x ~ 2700).
#
# The top is a pinned free stream (zero pressure gradient) and the
# domain is tall (~14 delta99): a transmissive top would let the
# layer displacement accelerate the flow and thin the BL.

backend = hybrid
scheme = muscl
t_end = 12.0
cfl = 0.4
mu = 8e-5

[domain]
x0 = 0
x1 = 1.25
y0 = 0
y1 = 1.0

[grid]
nx = 320
ny = 256

[state.air]
rho = 1.0
u = 0.3
p = 1.0

[ic]
default = air

[bc]
left = inflow air
right = transmissive
top = inflow air                       # pinned free stream (ZPG)
bottom = reflective if x < 0.15 else noslip   # slip then no-slip

[amr]
enabled = false
levels = 1

[output]
frames = 5
prefix = out/blasius

[diagnostics]
every = 500
file = out/blasius_log.csv
