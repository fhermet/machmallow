# Réflexion d'un choc plan (Ms = 2) sur une PAROI IMMERGÉE déclarative.
# Un choc se propage en +x dans l'air au repos et se réfléchit sur un bloc
# solide aligné à la grille (face en x = 0.7). La pression de paroi après
# réflexion a une valeur exacte (réflexion 1D de choc) : p_r = 15 p0.
# Sert de cas de référence au gate `immersed_case`.

backend = cpu
t_end = 0.32
cfl = 0.4

[domain]
x0 = 0
x1 = 1
y0 = 0
y1 = 0.02

[grid]
nx = 400
ny = 8

[state.pre]
rho = 1
u = 0
v = 0
p = 1

# état post-choc exact (Rankine-Hugoniot) d'un choc Ms = 2 dans `pre`
[state.post]
shock = pre mach 2 +x

[ic]
default = pre
region.1 = band x -1 0.2 : post   # gaz post-choc derrière x = 0.2

# paroi immergée : bloc solide couvrant x >= 0.7 (toute la hauteur)
[solid]
region.1 = rect 0.7 1.01 -0.01 0.03

[bc]
y = periodic
left = transmissive
right = transmissive

[output]
frames = 0
