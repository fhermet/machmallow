# Couche de cisaillement visqueuse (Navier-Stokes) — déclaratif.
# Profil v(x) en erf qui diffuse ; mu > 0 obligatoire pour voir l'effet.

backend = hybrid
t_end = 0.15
cfl = 0.4
mu = 5e-3             # viscosité dynamique (rho = 1 -> nu = mu)

[domain]
x0 = 0
x1 = 1
y0 = 0
y1 = 0.25

[grid]
nx = 128
ny = 32

[state.rest]
rho = 1.0
p = 1.0

[ic]
default = rest
perturb.1 = v erf 0.5 0.05 0.1    # v += 0.1·erf((x-0.5)/0.05)

[bc]
left = transmissive
right = transmissive
bottom = transmissive
top = transmissive

# Note : le tagging actuel (gradients de rho/vitesse) voit le cisaillement
# via tag_velocity ; ici on reste en grille uniforme.
[amr]
enabled = false
block = 8

[output]
frames = 3
prefix = out/shear_run
