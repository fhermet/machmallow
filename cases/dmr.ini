# Double Mach reflection (Woodward & Colella 1984) — 100% déclaratif.
# Choc Mach 10 incliné à 60° : demi-plan x - y/tan(60°) < 1/6 avançant à
# la vitesse normale 10. Les BCs `analytic` réévaluent ce front mobile au
# temps t dans les ghosts (= la BC exacte du haut), et le bas est
# segmenté : inflow post-choc avant le coin de la paroi, mur réfléchissant
# après.

backend = hybrid      # cpu | hybrid
t_end = 0.2
cfl = 0.4

[domain]
x0 = 0
x1 = 4
y0 = 0
y1 = 1

[grid]
nx = 512
ny = 128              # base 1/128 ; finest = ny/4 * 2^(levels-1)

[state.pre]           # gaz au repos devant le choc
rho = 1.4
p = 1.0

[state.post]          # derrière le choc Mach 10 à 60°
rho = 8.0
u = 7.144709581221619     # 8.25 * sin(60°)
v = -4.125                # -8.25 * cos(60°)
p = 116.5

[ic]
default = pre
region.1 = halfplane 1 -0.5773502691896258 0.16666666666666666 speed 10 : post

[bc]
left = analytic
right = transmissive
bottom = analytic if x < 0.16666666666666666 else reflective
top = analytic

[amr]
enabled = true
block = 8
levels = 3
tag_threshold = 0.12
regrid_every = 4
subcycle = true

[output]
frames = 4
prefix = out/dmr_run
