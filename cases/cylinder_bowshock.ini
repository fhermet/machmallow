# Detached bow shock on an IMMERSED CYLINDER — visual demo of immersed
# bodies. A uniform Mach 2 flow hits a solid cylinder (defined by a
# [solid] section, staircase representation on the Cartesian grid): a
# curved bow shock forms detached upstream of the nose, a sonic line, and
# a wake. Iconic in schlieren.
#
#   ./build/run cases/cylinder_bowshock.ini
#   python tools/schlieren_video.py out/cylinder --style schlieren
#
# Mach 2 : free-stream rho=1.4, p=1, gamma=1.4 -> c=1, donc u = Mach = 2.

backend = hybrid
t_end = 1.2
cfl = 0.4

[domain]
x0 = 0
x1 = 2.4
y0 = 0
y1 = 1.6

[grid]
nx = 480
ny = 320

[state.freestream]
rho = 1.4
u = 2.0
v = 0
p = 1.0

[ic]
default = freestream      # the whole domain at relative rest = free-stream

[solid]
region.1 = circle 0.8 0.8 0.18

[bc]
left = inflow freestream  # supersonic inlet (all characteristics enter)
right = transmissive      # supersonic outlet
bottom = transmissive
top = transmissive

# AMR: refines the bow shock (density gradient) AND the cylinder edge
# (the staircase is tagged automatically) — smooths the boundary. 2 levels.
[amr]
levels = 2
tag_threshold = 0.1
regrid_every = 4
subcycle = true

[output]
frames = 60
prefix = out/cylinder
