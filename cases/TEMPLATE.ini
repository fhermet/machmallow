# ============================================================
# machmallow — modèle de fichier de cas (copier puis adapter)
# Tout le solveur se pilote d'ici : AUCUN code C++ à écrire.
#   ./build/run --check cases/moncas.ini   vérifier la config
#   ./build/run cases/moncas.ini           lancer
#   ./build/run --list                     rappel de la grammaire
# Attention : '#' ET ';' démarrent un commentaire -> une clé par ligne.
# ============================================================

backend = hybrid      # cpu (référence) | hybrid (GPU Metal)
t_end = 0.2
cfl = 0.4
mu = 0                # viscosité dynamique > 0 -> Navier-Stokes

#[physics]
#gravity = 0 -0.1     # source splittée ; les murs reflective deviennent
#                     # hydrostatiques automatiquement

[domain]              # rectangle physique
x0 = 0
x1 = 1
y0 = 0
y1 = 1

[grid]                # résolution de base (multiples de amr.block)
nx = 128
ny = 128

# --- Bi-gaz (optionnel) : deux gamma, puis `gas = 2` sur les états
#     du second gaz. Le solveur transporte la fraction massique
#     (cf. bubble.ini, rm.ini). Incompatible avec mu > 0 pour l'instant.
#[species]
#gamma1 = 1.4          # gaz 1 (défaut des états)
#gamma2 = 1.667        # gaz 2

# --- États primitifs nommés (rho, u, v, p ; défauts 1,0,0,1 ;
#     `gas = 2` rattache l'état au second gaz d'un cas [species]) ---
[state.fond]
rho = 1.0
p = 1.0

[state.bulle]
rho = 0.1
p = 1.0

# État dérivé : post-choc Rankine-Hugoniot calculé par le solveur
# (référence un état NON dérivé ; direction +x|-x|+y|-y, défaut +x)
#[state.choc]
#shock = fond mach 1.5

# --- Condition initiale : un défaut + des régions qui le surchargent
#     (appliquées dans l'ordre), + des perturbations additives ---
[ic]
default = fond
# region.N = halfplane a b c [speed s] : etat   -> a*x+b*y < c
#            (speed s : le front avance à la vitesse normale s — choc
#             mobile ; `speed auto` = vitesse RH de l'état dérivé)
#          | band x|y lo hi : etat
#          | rect x0 x1 y0 y1 : etat
#          | circle cx cy r : etat
#          | sinex x0 amp lambda : etat  -> x < x0+amp*cos(2*pi*y/lambda)
region.1 = circle 0.5 0.5 0.15 : bulle
# perturb.N = u|v|rho|p sin <périodes> <amplitude>     (le long de x)
#           | u|v|rho|p erf <x0> <largeur> <amplitude>
#           | u|v|rho|p sing <pér.> <amp> <yc> <sigma>  (sin × gauss(y))
#           | p hydro <yref>     (pression hydrostatique, utilise gravity)
#perturb.1 = v sin 2 0.01

# --- Conditions aux limites par côté ---
# transmissive | reflective | analytic | inflow <etat>
#   analytic : réévalue les régions (fronts mobiles inclus) au temps t
#              dans les ghosts -> BC exacte de choc incident
# segmentation : <spec> if x < val else <spec>   (x pour bottom/top,
#                y pour left/right)
# périodicité par paire : x = periodic et/ou y = periodic
[bc]
left = transmissive
right = transmissive
bottom = reflective
top = transmissive

[amr]
enabled = true
levels = 2            # finest = ny * 2^(levels-1) / Ly
block = 8
tag_threshold = 0.05  # gradient de densité relatif
tag_velocity = 0      # saut de vitesse / c locale (cisaillements)
regrid_every = 4
subcycle = true

[output]
frames = 4
prefix = out/moncas
# checkpoint = out/moncas.ck    # restart = out/moncas.ck pour reprendre
# max_steps = 100               # borne dure (smoke tests)

# --- Vue temps réel (backend hybrid) : la simulation dans une fenêtre,
#     échantillonnée zéro-copie depuis les buffers de calcul.
#     espace = pause, q ou fermer = arrêter proprement le calcul ---
#[render]
#live = true
#scale = 5             # pixels par cellule de base
#every = 2             # pas de base entre deux frames
#grid = true           # contours des patchs AMR
#rho_min = 0           # 0/0 = auto depuis l'IC
#rho_max = 0

# --- Journal du calcul : séries temporelles intégrales en CSV ---
# step, t, dt, résidus par équation (RMS de dU/dt sur la base : masse,
# qdm x/y, énergie — suivi de convergence), cellules, patchs, extrema
# rho/p, masse, énergies cinétique/totale, enstrophie, temps mur, débit
[diagnostics]
every = 10            # pas de base entre deux lignes (0 = désactivé)
# file = out/moncas_log.csv    # défaut : <output.prefix>_log.csv
