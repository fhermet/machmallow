# Viscous shear layer (Navier-Stokes) — declarative.
# v(x) profile in erf that diffuses; mu > 0 required to see the effect.

backend = hybrid
t_end = 0.15
cfl = 0.4
mu = 5e-3             # dynamic viscosity (rho = 1 -> nu = mu)

[domain]
x0 = 0
x1 = 1
y0 = 0
y1 = 0.25

[grid]
nx = 128
ny = 32

[state.rest]
rho = 1.0
p = 1.0

[ic]
default = rest
perturb.1 = v erf 0.5 0.05 0.1    # v += 0.1·erf((x-0.5)/0.05)

[bc]
left = transmissive
right = transmissive
bottom = transmissive
top = transmissive

# Note: the current tagging (rho/velocity gradients) sees the shear
# via tag_velocity; here we stay on a uniform grid.
[amr]
enabled = false
block = 8

[output]
frames = 3
prefix = out/shear_run
