# --- HERO SHOT vertical (short format 9:16) ----------------------------
# ONE big subject, full frame: a strong planar shock wave (Mach 2.5)
# rises and hits a light bubble (helium) that fills the width.
# It's the canonical shock/bubble interaction, but pushed for the image:
#
#   - the shock REFRACTS as it enters the bubble (slow -> fast gas)
#     and FOCUSES there -> a jet pierces the bubble from behind ;
#   - the baroclinic deposition of vorticity (grad(rho) x grad(p)) rolls
#     the bubble into a counter-rotating VORTEX RING ;
#   - the interface destabilizes into Kelvin-Helmholtz BILLOWS, then
#     the ring fragments into TURBULENT MIXING ;
#   - the side walls (channel) reflect the shock -> secondary
#     structures that rework the wake.
#
# All the complexity of compressible physics in a single readable
# plane, that rises and blooms in the vertical frame.
#
# Live:  ./build/run cases/bubble_hero.ini
# Chiseled render: scheme = weno5 (much less dissipated vortices) + larger
# scale. levels = 5 possible but heavy ; 4 is enough on screen.

backend = hybrid
t_end = 0.9
cfl = 0.4

[domain]
x0 = 0
x1 = 1.0
y0 = 0
y1 = 2.0              # vertical format 1:2 (close to 9:16)

[grid]
nx = 160             # square cells: nx/ny = (x1-x0)/(y1-y0)
ny = 320

[species]
gamma1 = 1.4         # air
gamma2 = 1.645       # contaminated helium (Haas & Sturtevant)

[state.ambient]      # air at rest (c = 1)
rho = 1.4
p = 1.0

[state.bubble]       # light helium, pressure equilibrium (rho/rho_air ~ 5.5)
rho = 0.2551
p = 1.0
gas = 2              # true two-gas: interface tracked by phi/Gamma

[state.shock]
shock = ambient mach 2.5 +y   # strong rising shock, post-shock Rankine-Hugoniot

[ic]
default = ambient
region.1 = circle 0.5 0.65 0.28 : bubble          # big centered subject
region.2 = halfplane 0 1 0.3 speed auto : shock    # planar front, rises (+y)

[bc]
bottom = analytic    # the moving front provides the exact inflow
top = transmissive
left = reflective     # channel: keeps the incident shock nicely planar
right = reflective

[amr]
enabled = true
block = 8
levels = 4           # finest 1/1280 ; a single subject -> well under the cap
tag_threshold = 0.04 # a bit more sensitive -> catches the fine KH billows
tag_velocity = 0.05
regrid_every = 4
subcycle = true

[output]
frames = 30          # smooth VTK sequence for editing
prefix = out/bubble_hero

[render]
live = true
scale = 5            # pixels per base cell (800 x 1600, vertical)
every = 1            # refreshed every step -> smooth live for capture
grid = false         # raw beauty (the mesh overlay = "tech" variant)
rho_min = 0          # 0/0 = auto from the IC
rho_max = 0
